<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VCS Attendance Scanner</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>📚 VCS Attendance Scanner</h1>
        <p>Vacation Church School Student Management System</p>
      </div>

      <div class="content">
        <!-- Status Messages -->
        <div id="statusMessage" class="status-message"></div>

        <!-- Scanner Section -->
        <div class="scanner-section" id="scannerSection">
          <div id="reader"></div>

          <div class="scan-result" id="scanResult">
            <strong>QR Code Detected:</strong> <span id="qrContent"></span>
          </div>

          <div class="manual-toggle">
            <p>
              Camera not working?
              <span class="toggle-link" onclick="toggleManualEntry()"
                >Enter Student ID manually</span
              >
            </p>
            <div class="id-input-section" id="manualEntry">
              <input
                type="text"
                id="manualStudentId"
                placeholder="Enter Student ID (e.g., VCS2024001)"
              />
              <button class="btn btn-secondary" onclick="lookupManualId()">
                Look Up Student
              </button>
            </div>
          </div>
        </div>

        <!-- Loading Spinner -->
        <div class="spinner" id="spinner"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>

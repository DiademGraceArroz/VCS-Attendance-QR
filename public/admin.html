<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VCS — Admin: Manage Teachers</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .teacher-list {
        margin-top: 20px;
      }
      .teacher-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: white;
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }
      .teacher-item span {
        font-weight: 600;
        color: #333;
      }
      .teacher-item small {
        color: #999;
        font-size: 0.8rem;
        margin-left: 10px;
      }
      .btn-danger {
        background: #ff6b6b;
        color: white;
        padding: 6px 14px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 600;
      }
      .btn-danger:hover {
        background: #e55555;
      }
      .year-filter {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 20px;
      }
      .year-filter input {
        width: auto;
        flex: 1;
        padding: 10px 14px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
      }
      .year-filter input:focus {
        outline: none;
        border-color: #667eea;
      }
      .empty-state {
        text-align: center;
        color: #999;
        padding: 30px;
      }
      .add-form {
        background: #f5f7fa;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 30px;
      }
      .add-form h3 {
        margin-bottom: 15px;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>⚙️ Admin Panel</h1>
        <p>Manage Teachers per VCS Year</p>
      </div>

      <div class="content">
        <div id="statusMessage" class="status-message"></div>
        <div class="spinner" id="spinner"></div>

        <!-- Add Teacher Form -->
        <div class="add-form">
          <h3>➕ Add Teacher</h3>
          <div class="form-row">
            <div class="form-group">
              <label for="newYear">VCS Year *</label>
              <input
                type="text"
                id="newYear"
                placeholder="e.g., 2025"
                maxlength="4"
              />
            </div>
            <div class="form-group">
              <label for="newName">Teacher Name *</label>
              <input
                type="text"
                id="newName"
                placeholder="e.g., Teacher Maria"
              />
            </div>
          </div>
          <button class="btn btn-primary" onclick="addTeacher()">
            Add Teacher
          </button>
        </div>

        <!-- Filter by Year -->
        <div class="year-filter">
          <input
            type="text"
            id="filterYear"
            placeholder="Filter by year (e.g., 2025)"
            maxlength="4"
            oninput="loadTeachers(this.value)"
          />
          <button
            class="btn btn-secondary"
            style="width: auto; margin: 0"
            onclick="loadTeachers('')"
          >
            Show All
          </button>
        </div>

        <!-- Teacher List -->
        <div class="teacher-list" id="teacherList">
          <div class="empty-state">Enter a year above or click "Show All"</div>
        </div>

        <button
          class="btn btn-secondary"
          onclick="window.location.href = '/'"
          style="margin-top: 20px"
        >
          ← Back to Scanner
        </button>
      </div>
    </div>

    <script>
      const API_BASE_URL = "/api";

      function loadTeachers(vcsYear) {
        const url = vcsYear
          ? `${API_BASE_URL}/teachers?vcsYear=${encodeURIComponent(vcsYear)}`
          : `${API_BASE_URL}/teachers`;

        showSpinner(true);

        fetch(url)
          .then((res) => res.json())
          .then((teachers) => {
            showSpinner(false);
            const list = document.getElementById("teacherList");

            if (teachers.length === 0) {
              list.innerHTML =
                '<div class="empty-state">No teachers found for this year.</div>';
              return;
            }

            list.innerHTML = teachers
              .map(
                (t) => `
              <div class="teacher-item">
                <div>
                  <span>${t.name}</span>
                  <small>VCS ${t.vcsYear}</small>
                </div>
                <button class="btn-danger" onclick="deleteTeacher('${t._id}')">Remove</button>
              </div>
            `,
              )
              .join("");
          })
          .catch(() => {
            showSpinner(false);
            showStatus("Error loading teachers.", "error");
          });
      }

      function addTeacher() {
        const vcsYear = document.getElementById("newYear").value.trim();
        const name = document.getElementById("newName").value.trim();

        if (!vcsYear || !name) {
          showStatus("Please fill in both VCS Year and Teacher Name.", "error");
          return;
        }

        showSpinner(true);

        fetch(`${API_BASE_URL}/teachers`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ vcsYear, name }),
        })
          .then((res) => res.json())
          .then((data) => {
            showSpinner(false);
            if (data.error) {
              showStatus("Error: " + data.error, "error");
              return;
            }
            showStatus(
              `Teacher "${name}" added for VCS ${vcsYear}!`,
              "success",
            );
            document.getElementById("newName").value = "";
            loadTeachers(document.getElementById("filterYear").value);
          })
          .catch(() => {
            showSpinner(false);
            showStatus("Error adding teacher.", "error");
          });
      }

      function deleteTeacher(id) {
        if (!confirm("Remove this teacher?")) return;

        showSpinner(true);

        fetch(`${API_BASE_URL}/teachers/${id}`, { method: "DELETE" })
          .then((res) => res.json())
          .then(() => {
            showSpinner(false);
            showStatus("Teacher removed.", "success");
            loadTeachers(document.getElementById("filterYear").value);
          })
          .catch(() => {
            showSpinner(false);
            showStatus("Error removing teacher.", "error");
          });
      }

      function showSpinner(show) {
        document.getElementById("spinner").classList.toggle("active", show);
      }

      function showStatus(message, type) {
        const statusEl = document.getElementById("statusMessage");
        statusEl.textContent = message;
        statusEl.className = `status-message ${type}`;
        setTimeout(() => {
          statusEl.className = "status-message";
        }, 5000);
      }
    </script>
  </body>
</html>
